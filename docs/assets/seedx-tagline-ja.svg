<svg xmlns="http://www.w3.org/2000/svg" width="640" height="48" viewBox="0 0 640 48" role="img" aria-labelledby="title desc">
  <title id="title">すべてのアイデアは、ひとつのシステムへと育っていく。</title>
  <desc id="desc">SeedX tagline rendered with a blue, green, and violet gradient.</desc>
  <defs>
    <linearGradient id="tagline-gradient" x1="120" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft-shadow" x="-5%" y="-40%" width="110%" height="180%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.7" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <text
    x="320"
    y="25"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif"
    font-size="20"
    font-style="italic"
    font-weight="800"
    letter-spacing="0"
    fill="url(#tagline-gradient)"
    filter="url(#soft-shadow)"
  >すべてのアイデアは、ひとつのシステムへと育っていく。</text>
</svg>
