name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: intake + guard + derive
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: intake hook tests
        run: bash tools/test-intake-triggers.sh

      - name: private-config guard
        run: python3 tools/guard-private-config.py --all

      - name: derive-project-name smoke
        run: |
          mkdir -p /tmp/seedx-ci
          printf 'AI agent memory question\n' > /tmp/seedx-ci/q.md
          python3 tools/derive-project-name.py /tmp/seedx-ci/q.md

      - name: validate-run schema + protocol
        run: bash tools/test-validate-run.sh
